name: amcis-security-platform
base: core22
version: '1.0.0'
summary: AMCIS - Autonomous Multidimensional Cyber Intelligence System
description: |
  AMCIS is a next-generation security platform featuring:
  - Post-quantum cryptography (CRYSTALS-Kyber, CRYSTALS-Dilithium)
  - AI-powered threat detection and response
  - Federal compliance automation (NIST CSF, FedRAMP, CMMC)
  - Zero-trust network architecture
  - Real-time security orchestration (SOAR)
  - Supply chain security with SBOM generation
  
  Designed for government agencies and enterprises requiring
  quantum-resistant security and automated compliance.

grade: stable
confinement: strict

architectures:
  - amd64
  - arm64

apps:
  amcis:
    command: bin/amcis_main
    daemon: simple
    restart-condition: on-failure
    restart-delay: 10s
    plugs:
      - network
      - network-bind
      - network-control
      - firewall-control
      - hardware-observe
      - system-observe
      - log-observe
      - home
      - removable-media
    environment:
      AMCIS_CONFIG_PATH: $SNAP_DATA/config
      AMCIS_LOG_PATH: $SNAP_DATA/logs
      PYTHONPATH: $SNAP/lib/python3.10/site-packages:$PYTHONPATH

  amcis-cli:
    command: bin/amcis_cli
    plugs:
      - network
      - home
      - removable-media

  amcis-dashboard:
    command: bin/amcis_dashboard
    daemon: simple
    plugs:
      - network
      - network-bind
      - home

parts:
  amcis:
    plugin: python
    source: .
    python-packages:
      - cryptography>=41.0.0
      - pydantic>=2.0.0
      - fastapi>=0.100.0
      - uvicorn[standard]>=0.23.0
      - sqlalchemy>=2.0.0
      - redis>=4.6.0
      - prometheus-client>=0.17.0
      - psutil>=5.9.0
      - pyyaml>=6.0
      - requests>=2.31.0
      - aiohttp>=3.8.0
      - numpy>=1.24.0
      - pandas>=2.0.0
      - pqcrypto>=0.1.0
      - pyjwt>=2.8.0
      - passlib>=1.7.4
      - python-jose>=3.3.0
      - bcrypt>=4.0.0
    stage-packages:
      - libssl3
      - libffi8
      - libpython3.10
      - python3.10-minimal
      - ca-certificates
      - curl
    override-build: |
      craftctl default
      # Copy AMCIS source files
      cp -r $CRAFT_PROJECT_DIR/../AMCIS_Q_SEC_CORE/* $CRAFT_PART_INSTALL/lib/python3.10/site-packages/
      
      # Create wrapper scripts
      mkdir -p $CRAFT_PART_INSTALL/bin
      
      cat > $CRAFT_PART_INSTALL/bin/amcis_main << 'EOF'
      #!/bin/bash
      export PYTHONPATH=$SNAP/lib/python3.10/site-packages:$PYTHONPATH
      export AMCIS_CONFIG_PATH=$SNAP_DATA/config
      export AMCIS_LOG_PATH=$SNAP_DATA/logs
      python3 $SNAP/lib/python3.10/site-packages/cli/amcis_main.py "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/amcis_main
      
      cat > $CRAFT_PART_INSTALL/bin/amcis_cli << 'EOF'
      #!/bin/bash
      export PYTHONPATH=$SNAP/lib/python3.10/site-packages:$PYTHONPATH
      python3 $SNAP/lib/python3.10/site-packages/cli/amcis_main.py "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/amcis_cli
      
      cat > $CRAFT_PART_INSTALL/bin/amcis_dashboard << 'EOF'
      #!/bin/bash
      export PYTHONPATH=$SNAP/lib/python3.10/site-packages:$PYTHONPATH
      python3 $SNAP/lib/python3.10/site-packages/dashboard/launch_dashboard.py "$@"
      EOF
      chmod +x $CRAFT_PART_INSTALL/bin/amcis_dashboard

  config:
    plugin: dump
    source: config/
    organize:
      '*': config/

hooks:
  configure:
    plugs:
      - network
      - home

slots:
  amcis-service:
    interface: content
    content: amcis-data
    read:
      - $SNAP_DATA
