name: AMCIS CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  POETRY_VERSION: "1.7.0"

jobs:
  # ============================================================================
  # Code Quality & Security
  # ============================================================================
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install linting tools
        run: |
          pip install black isort flake8 bandit safety
      
      - name: Check code formatting (Black)
        run: |
          cd AMCIS_Q_SEC_CORE
          black --check --diff .
        continue-on-error: true
      
      - name: Check import sorting (isort)
        run: |
          cd AMCIS_Q_SEC_CORE
          isort --check-only --diff .
        continue-on-error: true
      
      - name: Lint with flake8
        run: |
          cd AMCIS_Q_SEC_CORE
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Security scan with Bandit
        run: |
          cd AMCIS_Q_SEC_CORE
          bandit -r . -f json -o ../bandit-report.json || true
          bandit -r . -f screen
      
      - name: Dependency vulnerability scan (Safety)
        run: |
          cd AMCIS_Q_SEC_CORE
          safety check --json --output ../safety-report.json || true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ============================================================================
  # Unit & Integration Tests
  # ============================================================================
  test:
    name: Run Test Suite
    runs-on: ubuntu-latest
    needs: lint-and-security
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: amcis
          POSTGRES_PASSWORD: amcis_test
          POSTGRES_DB: amcis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd AMCIS_Q_SEC_CORE
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio pytest-mock
      
      - name: Run tests with coverage
        run: |
          cd AMCIS_Q_SEC_CORE
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html --cov-fail-under=90
        env:
          DATABASE_URL: postgresql://amcis:amcis_test@localhost:5432/amcis_test
          REDIS_URL: redis://localhost:6379/0
          AMCIS_ENV: test
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            AMCIS_Q_SEC_CORE/coverage.xml
            AMCIS_Q_SEC_CORE/htmlcov/
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./AMCIS_Q_SEC_CORE/coverage.xml
          fail_ci_if_error: false

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: |
          cd AMCIS_Q_SEC_CORE
          pip install -r requirements.txt
          pip install pytest pytest-asyncio requests
      
      - name: Start services
        run: |
          cd AMCIS_Q_SEC_CORE
          # Start application in background
          python -m uvicorn src.amcis_main:app --host 0.0.0.0 --port 8080 &
          sleep 5
      
      - name: Run integration tests
        run: |
          cd AMCIS_Q_SEC_CORE
          pytest tests/integration/ -v || true

  # ============================================================================
  # Build & Package
  # ============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test, integration-test]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./AMCIS_Q_SEC_CORE
          push: true
          tags: |
            amcis/amcis-q-sec-core:latest
            amcis/amcis-q-sec-core:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================================
  # Deploy to Staging
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add actual deployment commands here
          # kubectl apply -k k8s/overlays/staging/

  # ============================================================================
  # Production Deployment (Manual)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Add actual deployment commands here
          # kubectl apply -k k8s/overlays/production/
