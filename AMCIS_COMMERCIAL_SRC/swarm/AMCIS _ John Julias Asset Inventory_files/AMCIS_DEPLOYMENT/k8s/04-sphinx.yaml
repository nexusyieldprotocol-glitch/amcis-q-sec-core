################################################################################
# AMCIS KUBERNETES DEPLOYMENT - SPHINX DISTRIBUTED AI
# Version: 2026.03.07
################################################################################

apiVersion: v1
kind: ConfigMap
metadata:
  name: sphinx-config
  namespace: amcis-system
data:
  NODE_COUNT: "4"
  CONSENSUS_THRESHOLD: "3"
  CONSENSUS_PORT: "8080"
  P2P_PORT: "9001"
  ML_KEM_ENABLED: "true"
  DILITHIUM_ENABLED: "true"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: sphinx-node
  namespace: amcis-system
  labels:
    app: sphinx-node
    component: distributed-ai
    version: "0.9.0"
spec:
  serviceName: sphinx
  replicas: 4
  selector:
    matchLabels:
      app: sphinx-node
  template:
    metadata:
      labels:
        app: sphinx-node
        component: distributed-ai
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: amcis-service-account
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: sphinx-node
                topologyKey: kubernetes.io/hostname
      containers:
        - name: sphinx
          image: amcis/sphinx:0.9.0
          ports:
            - containerPort: 8080
              name: api
            - containerPort: 9001
              name: p2p
          envFrom:
            - configMapRef:
                name: sphinx-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_ID
              value: "$(POD_NAME)"
            - name: PEERS
              value: "sphinx-0.sphinx:9001,sphinx-1.sphinx:9001,sphinx-2.sphinx:9001,sphinx-3.sphinx:9001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: database
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: sphinx-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: sphinx-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
        storageClassName: fast-ssd
---
apiVersion: v1
kind: Service
metadata:
  name: sphinx
  namespace: amcis-system
  labels:
    app: sphinx-node
spec:
  ports:
    - port: 8080
      targetPort: 8080
      name: api
    - port: 9001
      targetPort: 9001
      name: p2p
  selector:
    app: sphinx-node
  clusterIP: None
  publishNotReadyAddresses: true
---
apiVersion: v1
kind: Service
metadata:
  name: sphinx-api
  namespace: amcis-system
  labels:
    app: sphinx-node
spec:
  ports:
    - port: 80
      targetPort: 8080
      name: api
  selector:
    app: sphinx-node
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sphinx-api
  namespace: amcis-system
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - sphinx.amcis.io
      secretName: amcis-sphinx-tls
  rules:
    - host: sphinx.amcis.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sphinx-api
                port:
                  number: 80
