################################################################################
# AMCIS KUBERNETES DEPLOYMENT - NAMESPACE & RBAC
# Version: 2026.03.07
################################################################################

apiVersion: v1
kind: Namespace
metadata:
  name: amcis-system
  labels:
    app.kubernetes.io/name: amcis
    app.kubernetes.io/version: "2026.03.07"
    app.kubernetes.io/managed-by: terraform
    amcis.io/classification: production
    amcis.io/environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: amcis-quota
  namespace: amcis-system
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 32Gi
    limits.cpu: "32"
    limits.memory: 64Gi
    persistentvolumeclaims: "20"
    services: "20"
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: amcis-limits
  namespace: amcis-system
spec:
  limits:
    - default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 64Mi
      type: Container
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: amcis-service-account
  namespace: amcis-system
  annotations:
    amcis.io/description: "Service account for AMCIS ecosystem components"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: amcis-pod-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: amcis-pod-reader-binding
subjects:
  - kind: ServiceAccount
    name: amcis-service-account
    namespace: amcis-system
roleRef:
  kind: ClusterRole
  name: amcis-pod-reader
  apiGroup: rbac.authorization.k8s.io
