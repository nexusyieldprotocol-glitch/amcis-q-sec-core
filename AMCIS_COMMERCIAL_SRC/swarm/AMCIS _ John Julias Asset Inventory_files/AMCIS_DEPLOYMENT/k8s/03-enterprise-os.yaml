################################################################################
# AMCIS KUBERNETES DEPLOYMENT - ENTERPRISE OS
# Version: 2026.03.07
################################################################################

apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-os-config
  namespace: amcis-system
data:
  ENTERPRISE_ID: "AMCIS-GLOBAL-01"
  LIABILITY_MULTIPLIER: "1500000.0"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DATABASE_URL: "postgresql://amcis_admin:${POSTGRES_PASSWORD}@postgres:5432/amcis_enterprise"
  REDIS_URL: "redis://redis:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-api
  namespace: amcis-system
  labels:
    app: enterprise-api
    component: enterprise-os
    version: "9.0.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: enterprise-api
  template:
    metadata:
      labels:
        app: enterprise-api
        component: enterprise-os
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: amcis-service-account
      containers:
        - name: api
          image: amcis/enterprise-os:9.0.0
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: enterprise-os-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: password
          resources:
            requests:
              cpu: "200m"
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /kernel/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /kernel/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-api
  namespace: amcis-system
  labels:
    app: enterprise-api
spec:
  ports:
    - port: 80
      targetPort: 8000
      name: http
  selector:
    app: enterprise-api
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: enterprise-api
  namespace: amcis-system
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
spec:
  tls:
    - hosts:
        - api.amcis.io
      secretName: amcis-api-tls
  rules:
    - host: api.amcis.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: enterprise-api
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enterprise-api-hpa
  namespace: amcis-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enterprise-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enterprise-api-pdb
  namespace: amcis-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: enterprise-api
