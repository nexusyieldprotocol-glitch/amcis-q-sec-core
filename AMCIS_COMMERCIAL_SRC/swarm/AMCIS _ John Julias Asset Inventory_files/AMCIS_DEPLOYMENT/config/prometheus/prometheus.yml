################################################################################
# PROMETHEUS CONFIGURATION FOR AMCIS
# Version: 2026.03.07
################################################################################

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: amcis-production
    replica: '{{.ExternalURL}}'

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # AMCIS Enterprise OS
  - job_name: 'enterprise-api'
    static_configs:
      - targets: ['enterprise-api:8000']
    metrics_path: /metrics
    scrape_interval: 10s

  # AMCIS SPHINX Nodes
  - job_name: 'sphinx-nodes'
    static_configs:
      - targets:
        - 'sphinx-node-1:8080'
        - 'sphinx-node-2:8080'
        - 'sphinx-node-3:8080'
        - 'sphinx-node-4:8080'
    metrics_path: /metrics

  # AMCIS Stability Engine
  - job_name: 'stability-engine'
    static_configs:
      - targets: ['stability-engine:8080']

  # AMCIS Security Validator
  - job_name: 'security-validator'
    static_configs:
      - targets: ['security-validator:8080']

  # PostgreSQL Exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis Exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Node Exporter
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  # Cadvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
