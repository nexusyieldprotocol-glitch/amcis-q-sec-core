apiVersion: v1
kind: Namespace
metadata:
  name: amcis
  labels:
    name: amcis
    security: high
    compliance: strict
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: amcis-quota
  namespace: amcis
spec:
  hard:
    requests.cpu: "100"
    requests.memory: 256Gi
    limits.cpu: "200"
    limits.memory: 512Gi
    persistentvolumeclaims: "50"
    services.loadbalancers: "10"
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: amcis
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
