# AMCIS Demo Environment - Docker Compose
# One-command deployment for prospect demonstrations

version: "3.8"

services:
  amcis-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: amcis-demo
    hostname: amcis-demo
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AMCIS_DEMO_MODE=true
      - AMCIS_LOG_LEVEL=info
      - DEMO_SESSION_TIMEOUT=24h
    volumes:
      - demo-data:/app/data
      - demo-logs:/app/logs
    networks:
      - demo-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE

volumes:
  demo-data:
    driver: local
  demo-logs:
    driver: local

networks:
  demo-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
