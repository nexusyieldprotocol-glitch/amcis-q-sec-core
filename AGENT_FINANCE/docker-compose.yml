version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: amcis
      POSTGRES_PASSWORD: amcis123
      POSTGRES_DB: amcis_finance
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas.sql:/docker-entrypoint-initdb.d/001_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amcis"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Trading API
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://amcis:amcis123@postgres:5432/amcis_finance
      - REDIS_URL=redis://redis:6379/0
      - PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: python api/trading_api.py

  # Arbitrage Agent
  arbitrage-agent:
    build: .
    environment:
      - DATABASE_URL=postgresql://amcis:amcis123@postgres:5432/amcis_finance
      - AGENT_TYPE=arbitrage
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: python -m agents.arbitrage_agent

  # Market Maker Agent
  mm-agent:
    build: .
    environment:
      - DATABASE_URL=postgresql://amcis:amcis123@postgres:5432/amcis_finance
      - AGENT_TYPE=market_maker
    depends_on:
      - postgres
      - redis
    volumes:
      - ./:/app
    command: python -m agents.market_maker_agent

volumes:
  postgres_data:
  redis_data:
