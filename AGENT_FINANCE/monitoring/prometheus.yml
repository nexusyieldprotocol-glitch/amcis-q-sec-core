global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - "alert_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'agent-api'
    static_configs:
      - targets: ['agent-api:8081']
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: 'trading-agent'
    static_configs:
      - targets: ['trading-agent:8080']
    scrape_interval: 10s

  - job_name: 'arbitrage-agent'
    static_configs:
      - targets: ['arbitrage-agent:8080']
    scrape_interval: 5s  # Higher frequency for arbitrage

  - job_name: 'yield-agent'
    static_configs:
      - targets: ['yield-agent:8080']
    scrape_interval: 60s  # Lower frequency for yield

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
